ull\n"])</script><script>self.__next_f.push([1,"c:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"笔记 | shen 的博客\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"浏览所有技术笔记\"}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"11:\"$c:metadata\"\n"])</script><script>self.__next_f.push([1,"12:I[1632,[\"568\",\"static/chunks/app/notes/page-95e4adf272c0bf7a.js\"],\"default\"]\n13:T23e6,"])</script><script>self.__next_f.push([1,"\n\u003e 把 Claude Code 当 IDE 用，而不是当聊天工具。\n\n---\n\n## 接入国产模型\n\nAnthropic Claude API 费用较高，生产环境推荐接入国产模型。编码能力与工程化效果已达到可用水平，成本却低一个数量级。\n\n### 模型推荐排序（2026-06）\n\n| 排名 | 模型 | 特点 | API 端点 |\n|------|------|------|----------|\n| 1 | **GLM-5.2** (智谱) | 编码能力最强，推理深度提升，适合大型工程 | `https://open.bigmodel.cn/api/paas/v4/` |\n| 2 | **Kimi K2.7** (月之暗面) | 长文本+推理增强，代码理解能力大幅提升 | `https://api.moonshot.cn/v1` |\n| 3 | **DeepSeek V4 Pro** | 数学/逻辑极强，性价比依然最高 | `https://api.deepseek.com/v1` |\n| 4 | **MiniMax M3** | 多模态+工具调用稳定，适合复杂 Agent 场景 | `https://api.minimax.chat/v1` |\n\n其他备选：Qwen3-Max、Baichuan5、Step-2。建议每个模型都重试 5 分钟自己的主力项目，看看哪个在自己代码库上表现最好。\n\n### ccswitch 安装与配置\n\n推荐用 `ccswitch` 管理多个模型配置，一键切换。\n\n```bash\n# 安装\nnpm install -g claude-settings-switch\n\n# 添加 GLM 配置\nccs add glm https://open.bigmodel.cn/api/paas/v4/ \u003cglm-api-key\u003e\n\n# 添加 Kimi 配置\nccs add kimi https://api.moonshot.cn/v1 \u003ckimi-api-key\u003e\n\n# 添加 DeepSeek 配置\nccs add ds https://api.deepseek.com/v1 \u003cdeepseek-api-key\u003e\n\n# 查看已有配置\nccs list\n\n# 切换到 GLM\nccs sw glm\n\n# 查看当前使用的配置\nccs current\n```\n\n配置文件存储在 `~/.ccswitcher/configs.json`，Claude Code 配置在 `~/.claude/settings.json`。\n\n### 手动配置（不用 ccswitch）\n\n直接修改 `~/.claude/settings.json`：\n\n```json\n{\n  \"provider\": \"openai\",\n  \"model\": \"glm-4\",\n  \"apiKey\": \"\u003cglm-api-key\u003e\",\n  \"apiUrl\": \"https://open.bigmodel.cn/api/paas/v4/\"\n}\n```\n\n各家提供商的 OpenAI 兼容格式略有不同，具体参考对方文档。一般只需改 `apiUrl` 和 `apiKey`，`model` 填对应模型名即可。\n\n---\n\n## 目录结构\n\nClaude Code 会自动读取项目目录下的特定文件，作为项目级指令和自定义命令。\n\n```\n项目根目录/\n├── .claude/\n│   ├── CLAUDE.md          # 项目级系统指令，每次对话自动带入上下文\n│   └── commands/          # 自定义命令，每个 .md 文件就是一个命令\n│       ├── review.md      # 代码审查\n│       ├── refactor.md    # 重构提示\n│       └── test.md        # 生成测试\n├── AGENTS.md               # 项目概述、架构说明\n└── ...\n```\n\n### 文件作用\n\n| 文件 | 作用 | 生效范围 |\n|------|------|---------|\n| `~/.claude/CLAUDE.md` | 全局系统指令 | 所有项目 |\n| `.claude/CLAUDE.md` | 项目级系统指令 | 当前项目 |\n| `.claude/commands/*.md` | 自定义命令 | 当前项目 |\n| `CLAUDE.md` (根目录) | 项目级指令 | 当前项目 |\n\n项目级 `CLAUDE.md` 会覆盖全局的内容。建议每个代码库都放一个 `.claude/CLAUDE.md`。\n\n### AGENTS.md 链接到 CLAUDE.md\n\n如果你已有 `AGENTS.md` 写了项目概述，不需要重复写一份。在 `CLAUDE.md` 中直接引用即可：\n\n```markdown\n# 项目指令\n\n参见项目概述: [AGENTS.md](../AGENTS.md)\n\n## 编码规约\n\n- 使用 TypeScript，严格模式\n- 不允许使用 `any`\n- 所有 API 调用必须有类型定义\n```\n\nClaude Code 会自动跟踪相对路径并读取文件。也可以用符号链接：\n\n```bash\nln -s AGENTS.md .claude/AGENTS.md\n```\n\n然后在 `CLAUDE.md` 中引用 `./AGENTS.md`。\n\n### 自定义命令示例\n\n创建 `.claude/commands/review.md`：\n\n```markdown\n# 代码审查\n\n对当前文件进行代码审查，重点关注：\n1. 类型安全性\n2. 错误处理\n3. 性能问题\n4. 可读性\n\n输出格式：每个问题一行，带具体代码位置。\n```\n\n使用时输入 `/review` 即可触发。命令名就是文件名（不含 `.md`）。\n\n---\n\n## 常用指令\n\n### 内置命令\n\n| 指令 | 作用 |\n|------|------|\n| `/clear` | 清空当前对话上下文，不影响文件系统状态 |\n| `/compact` | 压缩对话历史，节省 token |\n| `/cost` | 查看当前会话的费用 |\n| `/exit` | 退出 Claude Code |\n| `/help` | 查看命令帮助 |\n| `/models` | 查看当前可用模型 |\n| `/terminal` | 打开终端模式（只返回命令，不解释） |\n\n### 文件操作\n\n| 指令 | 作用 |\n|------|------|\n| `find` | 搜索文件，支持正则 |\n| `read` | 读取文件内容，支持行范围 |\n| `edit` | 精确编辑文件，必须指定行号 |\n| `write` | 全重写文件 |\n| `grep` | 文件内容搜索 |\n| `ls` | 列出目录 |\n\n### 执行命令\n\n| 指令 | 作用 |\n|------|------|\n| `bash` | 执行 shell 命令，需要确认 |\n| `cat` | 查看文件内容 |\n| `git` | Git 操作，需要确认 |\n| `npm` / `pnpm` / `yarn` | 包管理操作 |\n\nClaude Code 执行可能改变状态的命令（如 `git commit`、`npm install`）时会弹出确认提示，输入 `y` 确认。\n\n### 实用模式\n\n**仅读模式**\n\n不想让 Claude 修改文件时：\n\n```\n只读查看这个文件的结构，不要改。\n```\n\n或者用带引号的问句，不包含修改指令。\n\n**任务式对话**\n\n对于复杂任务，先让 Claude 列出计划，确认后逐步执行：\n\n```\n实现用户登录功能，包含：1. JWT token 管理 2. 登录状态缓存 3. 登出逻辑。\n请先列出实现步骤，我确认后你再开始写代码。\n```\n\n**结果限制**\n\n限制输出长度，避免滚屏：\n\n```\n给出最重要的 3 个修改建议，每条不超过 50 字。\n```\n\n---\n\n## 工程化配置\n\n### 全局 CLAUDE.md\n\n`~/.claude/CLAUDE.md` 里放通用编码规范：\n\n```markdown\n# 全局编码规范\n\n## 通用原则\n\n- 使用 TypeScript，严格模式\n- 禁止使用 `any`\n- 所有函数必须有返回类型\n- 所有 API 调用必须有错误处理\n- 优先使用显式返回而非隐式转换\n\n## 文件操作\n\n- 修改文件前先读取完整内容\n- 使用精确的行号编辑，避免全重写\n- 不要删除未使用的 import，除非确认无用\n```\n\n### 项目级 CLAUDE.md\n\n`.claude/CLAUDE.md` 里放项目特定规范：\n\n```markdown\n# 项目指令\n\n参见项目概述: [AGENTS.md](../AGENTS.md)\n\n## 技术栈\n\n- Next.js 15 + App Router\n- Prisma ORM + PostgreSQL\n- Tailwind CSS\n- pnpm monorepo\n\n## 架构约定\n\n- API 放在 `apps/api/src`\n- 组件放在 `apps/web/components`\n- 工具函数放在 `packages/shared`\n- 不跨应用直接引用内部路径\n\n## 提交规范\n\n- 使用 Conventional Commits\n- 测试通过后才提交\n```\n\n### 自定义命令集\n\n常用的自定义命令放在 `.claude/commands/`：\n\n**review.md** —— 代码审查\n```markdown\n# 代码审查\n\n对当前文件进行审查，重点：\n1. 类型安全\n2. 错误处理\n3. 性能\n4. 可读性\n\n每个问题一行，带具体位置。\n```\n\n**refactor.md** —— 重构提示\n```markdown\n# 重构建议\n\n分析当前代码，给出重构建议。\n不要直接修改，只给出建议列表。\n```\n\n**test.md** —— 生成测试\n```markdown\n# 生成测试\n\n为当前文件生成单元测试，覆盖主要路径。\n使用 vitest，测试文件放在同目录的 __tests__ 下。\n```\n\n---\n\n## 效率技巧\n\n### 减少 Token 消耗\n\n1. **使用 `/compact`** —— 对话变长后压缩历史，保留文件状态但清空对话记录\n2. **小步进行** —— 每次只给一个具体任务，而非整个需求文档\n3. **限制范围** —— 指定具体文件或目录，避免让 Claude 扫描整个代码库\n4. **使用自定义命令** —— 封装常用模式，减少每次重复解释\n\n### 多模型切换策略\n\n**开发阶段**：用国产模型做大部分工作，成本极低，效率很高。\n\n**复杂逻辑**：遇到国产模型反复出错的复杂算法/架构问题，切换到 Claude 或 GPT-4 处理。\n\n**审查阶段**：重要代码审查用原版 Claude，确保没有潜在问题。\n\n### 快捷键\n\n| 快捷键 | 作用 |\n|--------|------|\n| Tab | 补全建议 |\n| Ctrl+C | 取消当前操作 |\n| Ctrl+D | 退出（等同 `/exit`） |\n| ↑ / ↓ | 浏览历史记录 |\n| Ctrl+R | 搜索历史记录 |\n\n---\n\n## 常见问题\n\n### Claude Code 启动失败\n\n```bash\n# 检查 Node 版本\nnode -v  # 需要 18+\n\n# 重新登录\nclaude auth login\n\n# 清理配置\nrm -rf ~/.claude\n```\n\n### 国产模型返回格式不对\n\n部分国产模型的 OpenAI 兼容层不完整，可能出现：\n- 不支持 function calling → 文件操作可能出问题\n- 不支持流式输出 → 响应变慢\n- 不支持某些系统提示 → 行为与原版不一致\n\n解决方案：支持较完整的模型（GLM-5.2 / Kimi K2.7 / DeepSeek V4 Pro），开发环境可以尝试更多选择。\n\n### 网络不稳定\n\n国产模型 API 有时会出现超时或限流：\n- 配置重试逻辑（大部分 ccswitch 已内置）\n- 开发环境可以用本地模型（Ollama 等）\n- 生产环境选择有 SLA 保障的提供商\n\n### 文件编辑不精确\n\nClaude Code 的编辑是基于行号的精确编辑，如果文件太大或结构复杂，可能会出现偏移。建议：\n- 先让 Claude 列出要修改的行号，确认后再执行\n- 对于大文件，先拆分成小任务\n- 修改后用 `git diff` 检查结果\n"])</script><script>self.__next_f.push([1,"14:T24e0,"])</script><script>self.__next_f.push([1,"---\ntitle: Claude Code 实战笔记\ndescription: Claude Code 接入国产模型、工程化配置与高效使用指南\ncategory: 工程化\ntags: [claude-code, ai-coding, 工具, ccswitch, 国产模型]\npubDate: 2026-06-17\nupdatedDate: 2026-06-18\n---\n\n\u003e 把 Claude Code 当 IDE 用，而不是当聊天工具。\n\n---\n\n## 接入国产模型\n\nAnthropic Claude API 费用较高，生产环境推荐接入国产模型。编码能力与工程化效果已达到可用水平，成本却低一个数量级。\n\n### 模型推荐排序（2026-06）\n\n| 排名 | 模型 | 特点 | API 端点 |\n|------|------|------|----------|\n| 1 | **GLM-5.2** (智谱) | 编码能力最强，推理深度提升，适合大型工程 | `https://open.bigmodel.cn/api/paas/v4/` |\n| 2 | **Kimi K2.7** (月之暗面) | 长文本+推理增强，代码理解能力大幅提升 | `https://api.moonshot.cn/v1` |\n| 3 | **DeepSeek V4 Pro** | 数学/逻辑极强，性价比依然最高 | `https://api.deepseek.com/v1` |\n| 4 | **MiniMax M3** | 多模态+工具调用稳定，适合复杂 Agent 场景 | `https://api.minimax.chat/v1` |\n\n其他备选：Qwen3-Max、Baichuan5、Step-2。建议每个模型都重试 5 分钟自己的主力项目，看看哪个在自己代码库上表现最好。\n\n### ccswitch 安装与配置\n\n推荐用 `ccswitch` 管理多个模型配置，一键切换。\n\n```bash\n# 安装\nnpm install -g claude-settings-switch\n\n# 添加 GLM 配置\nccs add glm https://open.bigmodel.cn/api/paas/v4/ \u003cglm-api-key\u003e\n\n# 添加 Kimi 配置\nccs add kimi https://api.moonshot.cn/v1 \u003ckimi-api-key\u003e\n\n# 添加 DeepSeek 配置\nccs add ds https://api.deepseek.com/v1 \u003cdeepseek-api-key\u003e\n\n# 查看已有配置\nccs list\n\n# 切换到 GLM\nccs sw glm\n\n# 查看当前使用的配置\nccs current\n```\n\n配置文件存储在 `~/.ccswitcher/configs.json`，Claude Code 配置在 `~/.claude/settings.json`。\n\n### 手动配置（不用 ccswitch）\n\n直接修改 `~/.claude/settings.json`：\n\n```json\n{\n  \"provider\": \"openai\",\n  \"model\": \"glm-4\",\n  \"apiKey\": \"\u003cglm-api-key\u003e\",\n  \"apiUrl\": \"https://open.bigmodel.cn/api/paas/v4/\"\n}\n```\n\n各家提供商的 OpenAI 兼容格式略有不同，具体参考对方文档。一般只需改 `apiUrl` 和 `apiKey`，`model` 填对应模型名即可。\n\n---\n\n## 目录结构\n\nClaude Code 会自动读取项目目录下的特定文件，作为项目级指令和自定义命令。\n\n```\n项目根目录/\n├── .claude/\n│   ├── CLAUDE.md          # 项目级系统指令，每次对话自动带入上下文\n│   └── commands/          # 自定义命令，每个 .md 文件就是一个命令\n│       ├── review.md      # 代码审查\n│       ├── refactor.md    # 重构提示\n│       └── test.md        # 生成测试\n├── AGENTS.md               # 项目概述、架构说明\n└── ...\n```\n\n### 文件作用\n\n| 文件 | 作用 | 生效范围 |\n|------|------|---------|\n| `~/.claude/CLAUDE.md` | 全局系统指令 | 所有项目 |\n| `.claude/CLAUDE.md` | 项目级系统指令 | 当前项目 |\n| `.claude/commands/*.md` | 自定义命令 | 当前项目 |\n| `CLAUDE.md` (根目录) | 项目级指令 | 当前项目 |\n\n项目级 `CLAUDE.md` 会覆盖全局的内容。建议每个代码库都放一个 `.claude/CLAUDE.md`。\n\n### AGENTS.md 链接到 CLAUDE.md\n\n如果你已有 `AGENTS.md` 写了项目概述，不需要重复写一份。在 `CLAUDE.md` 中直接引用即可：\n\n```markdown\n# 项目指令\n\n参见项目概述: [AGENTS.md](../AGENTS.md)\n\n## 编码规约\n\n- 使用 TypeScript，严格模式\n- 不允许使用 `any`\n- 所有 API 调用必须有类型定义\n```\n\nClaude Code 会自动跟踪相对路径并读取文件。也可以用符号链接：\n\n```bash\nln -s AGENTS.md .claude/AGENTS.md\n```\n\n然后在 `CLAUDE.md` 中引用 `./AGENTS.md`。\n\n### 自定义命令示例\n\n创建 `.claude/commands/review.md`：\n\n```markdown\n# 代码审查\n\n对当前文件进行代码审查，重点关注：\n1. 类型安全性\n2. 错误处理\n3. 性能问题\n4. 可读性\n\n输出格式：每个问题一行，带具体代码位置。\n```\n\n使用时输入 `/review` 即可触发。命令名就是文件名（不含 `.md`）。\n\n---\n\n## 常用指令\n\n### 内置命令\n\n| 指令 | 作用 |\n|------|------|\n| `/clear` | 清空当前对话上下文，不影响文件系统状态 |\n| `/compact` | 压缩对话历史，节省 token |\n| `/cost` | 查看当前会话的费用 |\n| `/exit` | 退出 Claude Code |\n| `/help` | 查看命令帮助 |\n| `/models` | 查看当前可用模型 |\n| `/terminal` | 打开终端模式（只返回命令，不解释） |\n\n### 文件操作\n\n| 指令 | 作用 |\n|------|------|\n| `find` | 搜索文件，支持正则 |\n| `read` | 读取文件内容，支持行范围 |\n| `edit` | 精确编辑文件，必须指定行号 |\n| `write` | 全重写文件 |\n| `grep` | 文件内容搜索 |\n| `ls` | 列出目录 |\n\n### 执行命令\n\n| 指令 | 作用 |\n|------|------|\n| `bash` | 执行 shell 命令，需要确认 |\n| `cat` | 查看文件内容 |\n| `git` | Git 操作，需要确认 |\n| `npm` / `pnpm` / `yarn` | 包管理操作 |\n\nClaude Code 执行可能改变状态的命令（如 `git commit`、`npm install`）时会弹出确认提示，输入 `y` 确认。\n\n### 实用模式\n\n**仅读模式**\n\n不想让 Claude 修改文件时：\n\n```\n只读查看这个文件的结构，不要改
